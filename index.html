<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ToDo App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>Minha Lista de Tarefas</h1>

  <div class="input-area">
    <input type="text" id="inputTarefa" placeholder="Digite uma tarefa">
    <button onclick="adicionarTarefa()">Adicionar</button>
  </div>

  <div class="filtros">
    <button id="btnTodas" onclick="mudarFiltro('todas')">Todas</button>
    <button id="btnPendentes" onclick="mudarFiltro('pendentes')">Pendentes</button>
    <button id="btnConcluidas" onclick="mudarFiltro('concluidas')">Concluidas</button>
  </div>

  <ul id="lista"></ul>

<div id="contador">
  <span id="total"></span>
  <span id="pendentes"></span>
  <span id="concluidas"></span>

</div> 

</div>

<script src="script.js"></script>
</body>
</html>
